<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src *; worker-src 'self'; manifest-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="theme-color" content="#161b22">
  <title>REST Client</title>
  <meta name="description" content="A privacy-conscious browser REST client with PHP cURL generation.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <script src="/assets/js/app.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#request-url">Skip to request editor</a>

  <header class="request-tabs-shell" aria-label="Request tabs">
    <div class="request-tabs-inner">
      <div class="request-tabs" id="request-tab-strip" role="tablist" aria-label="Open requests">
        <button class="request-tab-new" id="new-request-tab" type="button" aria-label="Create a new request" title="New request">+</button>
      </div>
    </div>
  </header>

  <main class="app" id="app">
    <section class="request-bar" aria-labelledby="request-heading">
      <h1 id="request-heading" class="sr-only">REST request editor</h1>
      <label class="sr-only" for="request-method">HTTP method</label>
      <select id="request-method" class="method method-GET" autocomplete="off">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="PATCH">PATCH</option>
        <option value="DELETE">DELETE</option>
        <option value="HEAD">HEAD</option>
      </select>
      <label class="sr-only" for="request-url">Request URL</label>
      <input id="request-url" type="url" inputmode="url" placeholder="https://api.example.com/endpoint" spellcheck="false" autocomplete="off" autocapitalize="none">
      <button id="send-request" type="button">Send</button>
    </section>

    <nav class="tabs" id="request-panel-tabs" aria-label="Request configuration">
      <button class="tab active" type="button" data-panel="params" aria-controls="panel-params" aria-selected="true">Params <span class="badge" id="badge-params">0</span></button>
      <button class="tab" type="button" data-panel="headers" aria-controls="panel-headers" aria-selected="false">Headers <span class="badge" id="badge-headers">1</span></button>
      <button class="tab" type="button" data-panel="auth" aria-controls="panel-auth" aria-selected="false">Auth</button>
      <button class="tab" type="button" data-panel="body" aria-controls="panel-body" aria-selected="false">Body</button>
    </nav>

    <section class="panel" id="panel-params" aria-labelledby="params-title">
      <h2 id="params-title" class="sr-only">Query parameters</h2>
      <div id="params-list" class="kv-list" aria-label="Query parameter rows"></div>
      <button class="add-row" type="button" data-target="params">+ Add parameter</button>
    </section>

    <section class="panel hidden" id="panel-headers" aria-labelledby="headers-title">
      <h2 id="headers-title" class="sr-only">Request headers</h2>
      <div id="headers-list" class="kv-list" aria-label="Header rows"></div>
      <button class="add-row" type="button" data-target="headers">+ Add header</button>
    </section>

    <section class="panel hidden" id="panel-auth" aria-labelledby="auth-title">
      <h2 id="auth-title" class="sr-only">Authentication</h2>
      <div class="field-row">
        <label class="sr-only" for="auth-type">Authentication type</label>
        <select id="auth-type" autocomplete="off">
          <option value="none">No auth</option>
          <option value="bearer">Bearer token</option>
          <option value="basic">Basic auth</option>
          <option value="apikey">API key header</option>
        </select>
      </div>
      <div class="auth-fields" id="auth-fields" aria-live="polite"></div>
    </section>

    <section class="panel hidden" id="panel-body" aria-labelledby="body-title">
      <h2 id="body-title" class="sr-only">Request body</h2>
      <div class="field-row">
        <label class="sr-only" for="body-type">Body type</label>
        <select id="body-type" autocomplete="off">
          <option value="none">No body</option>
          <option value="json">JSON</option>
          <option value="form">x-www-form-urlencoded</option>
          <option value="raw">Raw text</option>
        </select>
      </div>
      <div id="body-form" class="body-form hidden">
        <div id="body-form-list" class="kv-list" aria-label="Form body rows"></div>
        <button class="add-row" type="button" data-target="body-form">+ Add field</button>
      </div>
      <label class="sr-only" for="body-content">Request body content</label>
      <textarea id="body-content" class="hidden" placeholder="{&quot;key&quot;: &quot;value&quot;}" spellcheck="false" autocomplete="off"></textarea>
    </section>

    <section class="output-section" aria-labelledby="output-title">
      <h2 id="output-title" class="sr-only">Output</h2>
      <nav class="tabs" id="output-tabs" aria-label="Output view">
        <button class="tab active" type="button" data-output="response" aria-controls="output-response" aria-selected="true">Response</button>
        <button class="tab" type="button" data-output="code" aria-controls="output-code" aria-selected="false">PHP cURL</button>
      </nav>

      <div class="output-pane" id="output-response">
        <div class="output-toolbar response-toolbar">
          <div class="response-meta" id="response-meta" aria-live="polite">
            <span class="status-pill" id="status-pill">—</span>
            <span class="meta-item">Time: <strong id="response-time">—</strong></span>
            <span class="meta-item">Size: <strong id="response-size">—</strong></span>
          </div>
          <span id="response-empty-label">Response will appear here</span>
          <div class="response-actions" aria-label="Response actions">
            <label class="sr-only" for="response-search">Search response</label>
            <input id="response-search" class="response-search" type="search" placeholder="Find in response" autocomplete="off" spellcheck="false" aria-label="Find in response">
            <button class="copy-btn" id="copy-response" type="button" aria-label="Copy response body">Copy</button>
          </div>
        </div>
        <pre class="output empty" id="response-body" tabindex="0">Click Send to make a request, or switch to PHP cURL to see the generated code.</pre>
      </div>

      <div class="output-pane hidden" id="output-code">
        <div class="output-toolbar">
          <span>Generated PHP cURL</span>
          <button class="copy-btn" id="copy-code" type="button">Copy</button>
        </div>
        <pre class="output code" id="code-output" tabindex="0"></pre>
      </div>
    </section>
  </main>

  <button id="pwa-install" class="pwa-install hidden" type="button" aria-hidden="true" aria-label="Install app">
    <svg class="pwa-install__icon" aria-hidden="true" width="20" height="20" viewBox="0 0 20 20" fill="currentColor" focusable="false">
      <path fill="currentColor" d="M10 2a1 1 0 0 1 1 1v7.59l2.29-2.3a1 1 0 1 1 1.42 1.42l-4 4a1 1 0 0 1-1.42 0l-4-4a1 1 0 1 1 1.42-1.42L9 10.59V3a1 1 0 0 1 1-1Z" />
      <path fill="currentColor" d="M4 14a1 1 0 0 1 1 1v1h10v-1a1 1 0 1 1 2 0v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2a1 1 0 0 1 1-1Z" />
    </svg>
  </button>
</body>
</html>
